name: Lab 1 Validation

on:
  pull_request:
    branches: [ main, master ]

jobs:
  flutter_validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze